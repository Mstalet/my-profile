<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Trade With Me</title>
    <style>
        /* style.css */
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap');
        body {
            font-family: 'Open Sans', sans-serif;
            font-size: 18px;
            background-color: #1c1c1c;
            color: #e0e0e0;
            margin: 0;
        }
        h1, h2, h3 {
            font-weight: bold;
            color: #ffffff;
        }
        a {
            text-decoration: none;
            color: #1e90ff;
        }

        /* avatar.css */
        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
        }

        /* banner.css */
        .banner {
            background-image: linear-gradient(-225deg, rgba(28, 28, 28, 0.9) 0%, rgba(0, 0, 0, 0.5) 50%), url('images/banner-dark.jpg');
            color: #e0e0e0;
            padding: 120px 0;
            background-size: cover;
            background-position: center;
        }
        .banner h1 {
            font-size: 48px;
        }
        .banner h2 {
            font-size: 24px;
            font-weight: 300;
            opacity: 0.85;
            margin-bottom: 30px;
        }

        /* card.css */
        .cards {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .card {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            background-color: #333333;
            margin: 10px;
            flex-basis: 300px;
            flex-grow: 1;
        }
        .card img {
            width: 100px;
            border-radius: 4px;
        }
        .card h3 {
            flex-grow: 1;
            padding-left: 20px;
            font-size: 20px;
            color: #ffffff;
        }

        /* container.css */
        .container {
            width: 80%;
            max-width: 1200px;
            margin: 50px auto;
        }
        @media (max-width: 960px) {
            .container {
                width: 90%;
            }
        }
        @media (max-width: 720px) {
            .container {
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="banner">
        <div class="container">
            <h1>Discover my trading experiences and analyses.</h1>
            <h2>Trade With Me offers in-depth analysis and shared experiences to trade smarter.</h2>
            <a href="#apply-section" class="btn-blue">Subscribe Now</a>
        </div>
    </div>

    <div class="container">
        <h2>Featured Analyses</h2>
        <div class="cards">
            <div class="card">
                <img src="images/analysis1.png" alt="Technical Analysis">
                <h3>Technical Analysis</h3>
            </div>
            <div class="card">
                <img src="images/analysis2.png" alt="Market Trends">
                <h3>Market Trends</h3>
            </div>
            <div class="card">
                <img src="images/analysis3.png" alt="Swing Trading">
                <h3>Swing Trading</h3>
            </div>
        </div>
    </div>

    <div id="apply-section">
        <div data-tf-widget="aZzSOfKi" data-tf-opacity="100" data-tf-iframe-props="title=Subscribe Form" data-tf-transitive-search-params data-tf-medium="snippet" style="width:100%;height:500px;"></div>
        <script src="https://embed.typeform.com/next/embed.js"></script>
    </div>
</body>
</html>
